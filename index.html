<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Komunitas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-full-logo {
            background-image: url('URL_LOGO_KOMUNITAS_KAMU'); /* Ganti dengan link logo kamu */
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <div id="page1" class="h-screen w-full bg-full-logo flex items-center justify-center relative">
        <div class="absolute inset-0 bg-black opacity-50"></div> <div class="relative z-10 bg-white p-8 rounded-2xl shadow-2xl text-center max-w-sm mx-4">
            <h1 class="text-2xl font-bold text-gray-800 mb-2">Selamat Datang!</h1>
            <p class="text-gray-600 mb-6">Silakan isi daftar kehadiran kegiatan komunitas kami hari ini.</p>
            <button onclick="goToPage2()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg transition duration-300">
                Masuk Ke Absensi
            </button>
        </div>
    </div>

    <div id="page2" class="hidden min-h-screen flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md p-8 rounded-xl shadow-lg">
            <h2 class="text-xl font-bold mb-6 text-center text-gray-800">Formulir Kehadiran</h2>
            <form id="absensiForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Nama Lengkap</label>
                    <input type="text" name="nama" required class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Nama Instansi</label>
                    <input type="text" name="instansi" required class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Alamat</label>
                    <textarea name="alamat" required class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Nomor Handphone</label>
                    <input type="tel" name="nohp" required class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm">
                </div>
                <button type="submit" id="btnSubmit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded transition">
                    Kirim Kehadiran
                </button>
            </form>
        </div>
    </div>

    <script>
        const scriptURL = 'Thttps://script.google.com/macros/s/AKfycbyOZYLqtPbLpIzlmR7qMBUg5p3B28HcQTJ5Jt0DhlMv0xbscl7fIcUz4zKZR9Sb4juR/exec_DISINI'; // Tempel URL dari langkah 2

        function goToPage2() {
            document.getElementById('page1').classList.add('hidden');
            document.getElementById('page2').classList.remove('hidden');
        }

        document.getElementById('absensiForm').addEventListener('submit', e => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.innerText = 'Mengirim...';

            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());

            fetch(scriptURL, {
                method: 'POST',
                body: JSON.stringify(data)
            })
            .then(response => {
                alert('Terima kasih! Kehadiran Anda telah dicatat.');
                location.reload(); // Kembali ke halaman depan
            })
            .catch(error => {
                console.error('Error!', error.message);
                btn.disabled = false;
                btn.innerText = 'Kirim Kehadiran';
            });
        });
    </script>
</body>
</html>
